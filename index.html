<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深圳分店点亮地图</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <main class="page-shell">
    <section class="hero-panel">
      <p class="eyebrow">Branch Lighting Map</p>
      <h1>深圳分店点亮地图</h1>
      <p class="subtitle">按开店顺序逐个点亮深圳城区分店，适合品牌展示页、年会大屏和门店网络演示。</p>

      <div class="stats">
        <div>
          <span id="activeCount">0</span>
          <small>已点亮</small>
        </div>
        <div>
          <span id="totalCount">0</span>
          <small>分店总数</small>
        </div>
      </div>

      <div class="actions">
        <button id="replayBtn" type="button">重新播放</button>
        <button id="pauseBtn" type="button">暂停</button>
      </div>

      <ol id="storeList" class="store-list"></ol>
    </section>

    <section class="map-panel">
      <div id="map"></div>
      <div class="map-caption">地图数据来自阿里云 DataV 公共 GeoJSON，门店坐标为演示数据。</div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
